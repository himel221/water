<!DOCTYPE html>
<html>
<head>
    <title>Success - SuperWater</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 30px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-container">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2 class="text-success">✅ Customer Added Successfully!</h2>
            <p class="text-muted">Customer has been registered in the system.</p>
            <div class="mt-4">
                <a href="{% url 'customer_form' %}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Another Customer
                </a>
                <a href="{% url 'customer_list' %}" class="btn btn-secondary">
                    <i class="fas fa-list"></i> View All Customers
                </a>
            </div>
            <div class="mt-3">
                <a href="/" class="text-decoration-none">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
